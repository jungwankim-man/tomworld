{{- /* giscus comments — backed by GitHub Discussions on the
       jungwankim-man/tomworld repo. Requires GitHub Discussions
       enabled + the giscus app installed on the repo.
       Setup instructions live in CHANGELOG / docs. */ -}}
{{- if site.Params.giscus.repo -}}
<section class="comments" aria-label="댓글">
    <h3 style="margin-bottom:0.5em">댓글</h3>
    <script src="https://giscus.app/client.js"
            data-repo="{{ site.Params.giscus.repo }}"
            data-repo-id="{{ site.Params.giscus.repoId }}"
            data-category="{{ site.Params.giscus.category | default "General" }}"
            data-category-id="{{ site.Params.giscus.categoryId }}"
            data-mapping="{{ site.Params.giscus.mapping | default "pathname" }}"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="preferred_color_scheme"
            data-lang="ko"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
</section>
{{- end -}}
