baseURL: https://tomworlds.com/
languageCode: ko-KR
defaultContentLanguage: ko
title: tomworld
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 10

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: tomworld
  description: "tomworld blog"
  author: jungwankim-man
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  comments: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "tomworld"
    Content: "자동 생성 블로그"

  assets:
    disableHLJS: false
    favicon: "/favicon.ico"

menu:
  main:
    - identifier: posts
      name: 글
      url: /posts/
      weight: 10
    - identifier: tags
      name: 태그
      url: /tags/
      weight: 20
    - identifier: archives
      name: 아카이브
      url: /archives/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
