baseURL: https://tomworlds.com/
languageCode: ko-KR
defaultContentLanguage: ko
title: tomworld
theme: PaperMod

googleAnalytics: G-JHJJN0EHNB

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 10

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: tomworld
  description: "데이터로 받친 종목 분석과 직접 만든 자동매매 시스템 — 매일 부딪힌 것을 정리합니다"
  author: Jungwan Kim
  hideAuthor: true
  keywords:
    - 종목분석
    - 자동매매
    - 시사
    - 투자일기
    - 캠핑
    - 생활기록
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  comments: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "데이터로 받친 글만 씁니다"
    Content: >
      종목 분석은 차트·실적·업황 3축으로, 시사는 사실관계 위주로.
      직접 굴리는 자동매매 시스템과 매매 일지가 매일 쌓입니다.

      → [전체 글](/posts/) · [소개](/about/)

  assets:
    disableHLJS: false
    favicon: "/favicon.ico"

  analytics:
    google:
      SiteVerificationTag: "N_Hi7B_I29TZ0IJI6XBLaDQzwyPBC4Q-87CaFhni7wI"

menu:
  main:
    - identifier: posts
      name: 글
      url: /posts/
      weight: 10
    - identifier: categories
      name: 카테고리
      url: /categories/
      weight: 15
    - identifier: tags
      name: 태그
      url: /tags/
      weight: 20
    - identifier: archives
      name: 아카이브
      url: /archives/
      weight: 30
    - identifier: about
      name: 소개
      url: /about/
      weight: 40
    - identifier: contact
      name: 문의
      url: /contact/
      weight: 50
    - identifier: privacy
      name: 개인정보처리방침
      url: /privacy/
      weight: 60

taxonomies:
  category: categories
  series: series
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON
