baseURL: https://tomworlds.com/
languageCode: ko-KR
defaultContentLanguage: ko
title: tomworld
theme: PaperMod

googleAnalytics: G-JHJJN0EHNB

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 10

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: tomworld
  description: "일상의 이슈, 시사, 투자, 여행, 기술까지 — 깊이 있게 다루는 tomworld 블로그"
  author: Jungwan Kim
  keywords:
    - 시사
    - 이슈
    - 투자
    - 여행
    - 기술
    - 생활정보
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  comments: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "tomworld에 오신 것을 환영합니다 👋"
    Content: >
      일상의 이슈, 시사, 투자, 여행, 기술까지 — 매일 변하는 세상을
      독자 여러분께 깊이 있게 전달하는 블로그입니다.

  assets:
    disableHLJS: false
    favicon: "/favicon.ico"

  analytics:
    google:
      SiteVerificationTag: "N_Hi7B_I29TZ0IJI6XBLaDQzwyPBC4Q-87CaFhni7wI"

menu:
  main:
    - identifier: posts
      name: 글
      url: /posts/
      weight: 10
    - identifier: tags
      name: 태그
      url: /tags/
      weight: 20
    - identifier: archives
      name: 아카이브
      url: /archives/
      weight: 30
    - identifier: about
      name: 소개
      url: /about/
      weight: 40
    - identifier: contact
      name: 문의
      url: /contact/
      weight: 50
    - identifier: privacy
      name: 개인정보처리방침
      url: /privacy/
      weight: 60

outputs:
  home:
    - HTML
    - RSS
    - JSON
