<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="470" fill="#f6f8fa"/>
  <text x="380" y="44" fill="#1f2933" font-size="24" font-weight="700" text-anchor="middle">EYES STAY LEVEL · BODY TILTS</text>

  <!-- horizon -->
  <line x1="60" y1="92" x2="700" y2="92" stroke="#2d7dd2" stroke-width="3" stroke-dasharray="3 9"/>
  <text x="700" y="84" fill="#2d7dd2" font-size="17" text-anchor="end">HORIZON</text>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- head cocked, but eye-line horizontal -->
    <g transform="rotate(-12 300 126)">
      <circle cx="300" cy="126" r="27" fill="#fff" stroke="#168f6b" stroke-width="10"/>
    </g>
    <!-- eyes ON a horizontal line (level) -->
    <line x1="284" y1="120" x2="316" y2="120" stroke="#2d7dd2" stroke-width="3" stroke-dasharray="3 7"/>
    <circle cx="290" cy="120" r="4.5" fill="#1f2933"/>
    <circle cx="310" cy="120" r="4.5" fill="#1f2933"/>

    <!-- neck to shoulder center -->
    <line x1="300" y1="153" x2="300" y2="186" stroke="#168f6b" stroke-width="11"/>
    <!-- shoulder bar tilted (drops to figure-left) -->
    <line x1="250" y1="198" x2="350" y2="178" stroke="#e0613f" stroke-width="11"/>
    <!-- spine zig: shoulder center to hip center -->
    <line x1="300" y1="188" x2="300" y2="288" stroke="#9aa5b1" stroke-width="11"/>
    <!-- pelvis bar tilted opposite (high to figure-left) -->
    <line x1="250" y1="272" x2="350" y2="300" stroke="#e0a23f" stroke-width="11"/>
    <!-- legs: left longer (foot reaches ground from higher hip) -->
    <line x1="252" y1="276" x2="256" y2="430" stroke="#168f6b" stroke-width="11"/>
    <line x1="348" y1="298" x2="346" y2="430" stroke="#168f6b" stroke-width="11"/>
  </g>
  <line x1="120" y1="430" x2="480" y2="430" stroke="#cdd6db" stroke-width="3"/>

  <!-- callouts -->
  <g font-size="18" fill="#5b6b78">
    <line x1="330" y1="120" x2="470" y2="120" stroke="#cdd6db" stroke-width="2"/>
    <text x="478" y="118" fill="#2d7dd2" font-weight="700">eyes LEVEL</text>
    <text x="478" y="139" font-size="14">(reflex wins)</text>

    <line x1="320" y1="132" x2="470" y2="170" stroke="#cdd6db" stroke-width="2"/>
    <text x="478" y="174" fill="#168f6b" font-weight="700">head COCKS</text>

    <line x1="356" y1="180" x2="600" y2="210" stroke="#cdd6db" stroke-width="2"/>
    <text x="608" y="214" fill="#e0613f" font-weight="700">shoulder DROP</text>

    <line x1="356" y1="298" x2="600" y2="300" stroke="#cdd6db" stroke-width="2"/>
    <text x="608" y="304" fill="#c8881f" font-weight="700">pelvis TILT</text>

    <line x1="256" y1="400" x2="160" y2="370" stroke="#cdd6db" stroke-width="2"/>
    <text x="60" y="366" fill="#5b6b78" font-weight="700">longer leg</text>
  </g>
</svg>
